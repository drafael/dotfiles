# Midday Commander - Example Configuration
# Copy to ~/.config/mdc/config.toml to customize.

# Theme name (loads from ~/.config/mdc/themes/<name>.toml)
# Built-in options: "mc-classic", "catppuccin-mocha"
# Or place your own .toml in the themes directory.
theme = "catppuccin-frappe"

# ─── Behavior ────────────────────────────────────
[behavior]
# What Enter does on a file: "edit", "preview", or "execute"
enter_action = "edit"
# What Space does on a file: "preview" or "edit"
space_action = "preview"
# Whether to ask for confirmation before executing a file.
confirm_execute = true
# Whether to pause and wait after execution before returning to Midday Commander.
pause_after_execute = false

# ─── Key Bindings ────────────────────────────────
# Each binding can be a single string or a list of strings.
# Key names: f1-f12, ctrl+x, shift+x, alt+x, enter, esc, tab,
#   up, down, left, right, pgup, pgdown, home, end, insert,
#   backspace, delete, space
[keys]
quit          = ["f10", "ctrl+c"]
toggle_panel  = "tab"
swap_panels   = "ctrl+u"
copy          = "f5"
move          = "f6"
mkdir         = "f7"
delete        = "f8"
rename        = "shift+f6"
view          = "f3"
edit          = "f4"

# Navigation
up            = ["up", "k"]
down          = ["down", "j"]
page_up       = "pgup"
page_down     = "pgdown"
home          = "home"
end           = "end"
go_back       = "backspace"

# Selection
toggle_select = "ctrl+t"
select_up     = "shift+up"
select_down   = "shift+down"

# Search
quick_search  = "ctrl+s"

# Go to path
goto          = "ctrl+g"
fuzzy_find    = ["f9", "ctrl+p"]
bookmarks     = ["f2", "ctrl+b"]
help          = "f1"
theme_picker  = "ctrl+t"
cmd_exec      = "ctrl+r"
terminal      = "ctrl+o"
