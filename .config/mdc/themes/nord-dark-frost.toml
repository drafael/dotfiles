symlink_bg       = "polar_night_0"
cursor_fg        = "polar_night_0"
cursor_bg        = "frost_9"
cursor_dir_fg    = "polar_night_0"
cursor_dir_bg    = "frost_8"
cursor_dir_bold  = true
selected_fg      = "snow_storm_6"
selected_bg      = "polar_night_1"
selected_bold    = true

[statusbar]
fg = "snow_storm_6"
bg = "polar_night_1"

[menubar]
fg            = "snow_storm_6"
bg            = "polar_night_2"
fkey_hint_fg  = "polar_night_3"
fkey_hint_bg  = "polar_night_0"
fkey_label_fg = "polar_night_0"
fkey_label_bg = "frost_8"