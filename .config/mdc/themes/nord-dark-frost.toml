name = "Nord Dark Frost"

[palette]
polar_night_0 = "#2e3440"
polar_night_1 = "#3b4252"
polar_night_2 = "#434c5e"
polar_night_3 = "#4c566a"
snow_storm_4  = "#d8dee9"
snow_storm_5  = "#e5e9f0"
snow_storm_6  = "#eceff4"
frost_7       = "#8fbcbb"
frost_8       = "#88c0d0"
frost_9       = "#81a1c1"
frost_10      = "#5e81ac"
aurora_11     = "#bf616a"
aurora_12     = "#d08770"
aurora_13     = "#ebcb8b"
aurora_14     = "#a3be8c"
aurora_15     = "#b48ead"

[panel]
border_fg        = "polar_night_3"
border_bg        = "polar_night_0"
border_active_fg = "frost_8"
border_active_bg = "polar_night_0"
header_fg        = "frost_8"
header_bg        = "polar_night_0"
header_active_fg = "frost_7"
header_active_bg = "polar_night_0"

[panel.file]
