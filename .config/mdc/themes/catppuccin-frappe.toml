name = "Catppuccin Frappé"

[palette]
rosewater = "#f2d5cf"
flamingo  = "#eebebe"
pink      = "#f4b8e4"
mauve     = "#ca9ee6"
red       = "#e78284"
maroon    = "#ea999c"
peach     = "#ef9f76"
yellow    = "#e5c890"
green     = "#a6d189"
teal      = "#81c8be"
sky       = "#99d1db"
sapphire  = "#85c1dc"
blue      = "#8caaee"
lavender  = "#babbf1"
text      = "#c6d0f5"
subtext1  = "#b5bfe2"
subtext0  = "#a5adce"
overlay2  = "#949cbb"
overlay1  = "#838ba7"
overlay0  = "#737994"
surface2  = "#626880"
surface1  = "#51576d"
surface0  = "#414559"
base      = "#303446"
mantle    = "#292c3c"
crust     = "#232634"

# ─── File Panels ─────────────────────────────────
[panel]
border_fg        = "surface2"
border_bg        = "base"
border_active_fg = "lavender"
border_active_bg = "base"
header_fg        = "subtext0"
header_bg        = "base"
header_active_fg = "lavender"
header_active_bg = "base"

[panel.file]
normal_fg        = "text"
normal_bg        = "base"
dir_fg           = "blue"
dir_bg           = "base"
dir_bold         = true
exec_fg          = "green"
exec_bg          = "base"
symlink_fg       = "pink"
symlink_bg       = "base"
cursor_fg        = "crust"
cursor_bg        = "lavender"
cursor_dir_fg    = "crust"
cursor_dir_bg    = "blue"
cursor_dir_bold  = true
selected_fg      = "yellow"
selected_bg      = "base"
selected_bold    = true

# ─── Status Bar ──────────────────────────────────
[statusbar]
fg = "crust"
bg = "lavender"

# ─── Menu / F-Key Hints ─────────────────────────
[menubar]
fg            = "text"
bg            = "surface0"
fkey_hint_fg  = "subtext1"
fkey_hint_bg  = "crust"
fkey_label_fg = "text"
fkey_label_bg = "surface0"
