name = "Catppuccin Latte"

[palette]
rosewater = "#dc8a78"
flamingo  = "#dd7878"
pink      = "#ea76cb"
mauve     = "#8839ef"
red       = "#d20f39"
maroon    = "#e64553"
peach     = "#fe640b"
yellow    = "#df8e1d"
green     = "#40a02b"
teal      = "#179299"
sky       = "#04a5e5"
sapphire  = "#209fb5"
blue      = "#1e66f5"
lavender  = "#7287fd"
text      = "#4c4f69"
subtext1  = "#5c5f77"
subtext0  = "#6c6f85"
overlay2  = "#7c7f93"
overlay1  = "#8c8fa1"
overlay0  = "#9ca0b0"
surface2  = "#acb0be"
surface1  = "#bcc0cc"
surface0  = "#ccd0da"
base      = "#eff1f5"
mantle    = "#e6e9ef"
crust     = "#dce0e8"

# ─── File Panels ─────────────────────────────────
[panel]
border_fg        = "surface2"
border_bg        = "base"
border_active_fg = "lavender"
border_active_bg = "base"
header_fg        = "subtext0"
header_bg        = "base"
header_active_fg = "lavender"
header_active_bg = "base"

[panel.file]
normal_fg        = "text"
normal_bg        = "base"
dir_fg           = "blue"
dir_bg           = "base"
dir_bold         = true
exec_fg          = "green"
exec_bg          = "base"
symlink_fg       = "pink"
symlink_bg       = "base"
cursor_fg        = "base"
cursor_bg        = "lavender"
cursor_dir_fg    = "base"
cursor_dir_bg    = "blue"
cursor_dir_bold  = true
selected_fg      = "yellow"
selected_bg      = "base"
selected_bold    = true

# ─── Status Bar ──────────────────────────────────
[statusbar]
fg = "base"
bg = "lavender"

# ─── Menu / F-Key Hints ─────────────────────────
[menubar]
fg            = "text"
bg            = "surface0"
fkey_hint_fg  = "subtext1"
fkey_hint_bg  = "crust"
fkey_label_fg = "text"
fkey_label_bg = "surface0"
