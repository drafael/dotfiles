name = "Catppuccin Macchiato"

[palette]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"

# ─── File Panels ─────────────────────────────────
[panel]
border_fg        = "surface2"
border_bg        = "base"
border_active_fg = "lavender"
border_active_bg = "base"
header_fg        = "subtext0"
header_bg        = "base"
header_active_fg = "lavender"
header_active_bg = "base"

[panel.file]
normal_fg        = "text"
normal_bg        = "base"
dir_fg           = "blue"
dir_bg           = "base"
dir_bold         = true
exec_fg          = "green"
exec_bg          = "base"
symlink_fg       = "pink"
symlink_bg       = "base"
cursor_fg        = "crust"
cursor_bg        = "lavender"
cursor_dir_fg    = "crust"
cursor_dir_bg    = "blue"
cursor_dir_bold  = true
selected_fg      = "yellow"
selected_bg      = "base"
selected_bold    = true

# ─── Status Bar ──────────────────────────────────
[statusbar]
fg = "crust"
bg = "lavender"

# ─── Menu / F-Key Hints ─────────────────────────
[menubar]
fg            = "text"
bg            = "surface0"
fkey_hint_fg  = "subtext1"
fkey_hint_bg  = "crust"
fkey_label_fg = "text"
fkey_label_bg = "surface0"
